<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:transparent}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:8px 12px 4px}
.header{margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #eee}
.header h1{font-size:12px;color:#222;font-weight:600;line-height:1.2}
.header .url{font-size:9px;color:#888;margin-top:1px}
.header .url a{color:#1a73e8;text-decoration:none}
.stats{display:flex;gap:6px;margin-bottom:6px;justify-content:space-between}
.stat{text-align:center;flex:1}
.stat .num{font-size:16px;font-weight:700;color:#1a73e8;line-height:1}
.stat .lbl{font-size:8px;color:#555;margin-top:1px}
.stat .sub{font-size:7px;color:#aaa}
.chart-wrap{position:relative;margin:0 0 0 20px;height:90px}
.y-axis{position:absolute;left:-20px;top:0;bottom:0;width:20px}
.y-axis .yl{position:absolute;right:2px;font-size:7px;color:#888;transform:translateY(50%)}
.y-axis .yln{position:absolute;left:20px;right:0;border-bottom:1px solid #f0f0f0;pointer-events:none}
.bars{display:flex;align-items:flex-end;gap:2px;height:100%}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:2px 2px 0 0;cursor:default}
.year-labels{display:flex;gap:2px;margin-top:1px}
.year-labels span{flex:1;text-align:center;font-size:7px;color:#888}
.loading{text-align:center;color:#999;padding:10px 0;font-size:10px}
.error{color:#d32f2f;text-align:center;padding:10px;font-size:10px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Alsina : Journal of Arabic Studies</h1>
    <div class="url">Citations according to <a href="https://scholar.google.com/citations?user=TxioLDYAAAAJ" target="_blank">Google Scholar</a></div>
  </div>
  <div id="content"><div class="loading">Memuat…</div></div>
</div>
<script>
(async () => {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();

    const years = d.years || [];
    const maxVal = Math.max(...years.map(y => y.c), 1);
    const roundUp = Math.ceil(maxVal / 50) * 50 || 100;
    const steps = [0, roundUp * 0.5, roundUp];

    const html = `<div class="stats">
      <div class="stat"><div class="num">${d.citations}</div><div class="lbl">Citations</div><div class="sub">All</div></div>
      <div class="stat"><div class="num">${d.citations_since}</div><div class="lbl">Citations</div><div class="sub">Since 2021</div></div>
      <div class="stat"><div class="num">${d.hindex}</div><div class="lbl">h-index</div><div class="sub">All · Since</div></div>
      <div class="stat"><div class="num">${d.i10index}</div><div class="lbl">i10-index</div><div class="sub">All · Since</div></div>
    </div>
    <div class="chart-wrap"><div class="y-axis">${steps.map(s => {
      const pct = (s / roundUp) * 100;
      return `<div class="yl" style="bottom:${pct}%">${s}</div><div class="yln" style="bottom:${pct}%"></div>`;
    }).join('')}</div>
    <div class="bars">${years.map(y => {
      const pct = (y.c / roundUp) * 100 || 1;
      return `<div class="bar-wrap"><div class="bar" style="height:${pct}%;background:#1a73e8" title="${y.y}: ${y.c}"></div></div>`;
    }).join('')}</div>
    <div class="year-labels">${years.map(y => `<span>${y.y}</span>`).join('')}</div></div>`;

    document.getElementById('content').innerHTML = html;
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="error">Gagal memuat data</div>';
  }
})();
</script>
</body>
</html>
